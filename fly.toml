app = "iron-condor-bot"
primary_region = "sin"        # Singapore — closest to India

[build]

[env]
  TZ = "Asia/Kolkata"

# No HTTP service — this is a pure background worker
# Secrets (TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID) are set via CLI

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
