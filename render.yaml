services:
  - type: worker
    name: iron-condor-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python iron_condor_live.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false        # you enter this manually in Render dashboard
      - key: TELEGRAM_CHAT_ID
        sync: false        # you enter this manually in Render dashboard
    plan: free
